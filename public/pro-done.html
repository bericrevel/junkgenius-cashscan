<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JunkGenius</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0A0D0C; color: #B9C4BE; font-family: system-ui, -apple-system, sans-serif;
    text-align: center; padding: 24px; box-sizing: border-box;
  }
  .card { max-width: 340px; }
  .big { font-size: 44px; margin-bottom: 12px; }
  h1 { font-size: 22px; margin: 0 0 10px; color: #fff; }
  p { font-size: 15px; line-height: 1.5; margin: 0; }
  b { color: #34D399; }
  .hint { margin-top: 18px; font-size: 13px; color: #7C8983; }
</style>
</head>
<body>
  <div class="card">
    <div class="big" id="icon">✅</div>
    <h1 id="head">Payment complete</h1>
    <p id="text">You're all set. Switch back to the JunkGenius app and tap
      <b>"I finished paying — check now"</b>. It can take up to a minute to unlock.</p>
    <p class="hint">You can close this tab.</p>
  </div>
  <script>
    var s = new URLSearchParams(location.search).get("status");
    var icon = document.getElementById("icon"),
        head = document.getElementById("head"),
        text = document.getElementById("text");
    if (s === "canceled") {
      icon.textContent = "↩️";
      head.textContent = "No charge made";
      text.innerHTML = "Checkout was canceled — nothing was billed. Switch back to JunkGenius whenever you're ready.";
    } else if (s === "portal") {
      icon.textContent = "👍";
      head.textContent = "Subscription updated";
      text.innerHTML = "Any changes you made are saved. Switch back to the JunkGenius app.";
    }
  </script>
</body>
</html>
